name: factura

services:
  database:
    image: mysql:8.4
    container_name: factura-database
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    ports:
      - "3307:3306"

    volumes:
      - factura_mysql_data:/var/lib/mysql

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: factura-mailpit
    restart: unless-stopped

    ports:
      - "8025:8025"

    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db

    volumes:
      - factura_mailpit_data:/data

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: factura-php
    restart: unless-stopped

    working_dir: /var/www/html

    volumes:
      - ./backend:/var/www/html

    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started

  nginx:
    image: nginx:alpine

    container_name: factura-nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - php

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile

    container_name: factura-frontend
    restart: unless-stopped

    ports:
      - "4200:4200"

    volumes:
      - ./frontend:/app
      - factura_node_modules:/app/node_modules

    depends_on:
      - nginx

volumes:
  factura_mysql_data:
  factura_node_modules:
  factura_mailpit_data:
