<div class="app-layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">F</div>
      <h2>FACTURA</h2>
    </div>

    <nav>
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <img src="/icons/dashboard.svg" alt="" />
        <span>Tableau de bord</span>
      </a>

      <h4>Gestion</h4>

      <a routerLink="/clients" routerLinkActive="active">
        <img src="/icons/user.svg" alt="" />
        <span>Clients</span>
      </a>

      <a routerLink="/produits" routerLinkActive="active">
        <img src="/icons/package.svg" alt="" />
        <span>Produits et services</span>
      </a>

      <h4>Facturation</h4>

      <a routerLink="/devis" routerLinkActive="active">
        <img src="/icons/file-text.svg" alt="" />
        <span>Devis</span>
      </a>

      <a routerLink="/factures" routerLinkActive="active">
        <img src="/icons/receipt.svg" alt="" />
        <span>Factures</span>
      </a>

      <a routerLink="/paiements" routerLinkActive="active">
        <img src="/icons/wallet.svg" alt="" />
        <span>Paiements</span>
      </a>

      <h4>Configuration</h4>

      <a routerLink="/parametres" routerLinkActive="active">
        <img src="/icons/settings.svg" alt="" />
        <span>Paramètres</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      @if (userMenuOpen()) {
        <div class="user-menu">
          <button type="button">Mon compte</button>

          <button type="button" (click)="logout()">Déconnexion</button>
        </div>
      }

      <button
        type="button"
        class="user-profile"
        [attr.aria-expanded]="userMenuOpen()"
        aria-label="Ouvrir le menu utilisateur"
        (click)="toggleUserMenu()"
      >
        @if (currentUser()) {
          <div class="user-avatar">
            {{ userInitials() }}
          </div>

          <div class="user-info">
            <strong>{{ displayName() }}</strong>
            <span>{{ roleLabel() }}</span>
          </div>
        } @else {
          <div class="user-avatar user-avatar-loading"></div>

          <div class="user-info">
            <strong>Chargement...</strong>
            <span>Compte utilisateur</span>
          </div>
        }

        <img class="user-chevron" src="/icons/chevron-down.svg" alt="" />
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="header">
      <div class="header-left">
        <h1>Tableau de bord</h1>

        <label class="search-field">
          <span aria-hidden="true">⌕</span>

          <input type="search" placeholder="Rechercher..." aria-label="Rechercher" />
        </label>
      </div>

      <div class="header-actions">
        <div class="period-dropdown">
          <button
            type="button"
            class="period-trigger"
            [attr.aria-expanded]="periodMenuOpen()"
            aria-haspopup="listbox"
            aria-label="Choisir la période du tableau de bord"
            (click)="togglePeriodMenu()"
          >
            <span>{{ selectedPeriodLabel() }}</span>

            <img src="/icons/chevron-down.svg" alt="" class="period-chevron" />
          </button>

          @if (periodMenuOpen()) {
            <div class="period-menu" role="listbox" aria-label="Période du tableau de bord">
              @for (period of periodOptions; track period.annee + '-' + period.mois) {
                <button
                  type="button"
                  class="period-option"
                  role="option"
                  [class.active]="isPeriodSelected(period)"
                  [attr.aria-selected]="isPeriodSelected(period)"
                  (click)="selectPeriod(period)"
                >
                  {{ period.label }}
                </button>
              }
            </div>
          }
        </div>

        <button type="button" class="button-primary">
          <img src="/icons/plus.svg" alt="" width="16" height="16" />

          <span>Nouvelle facture</span>
        </button>

        <button type="button" class="notification-button" aria-label="Notifications">
          <img src="/icons/bell.svg" alt="" width="18" height="18" />
        </button>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
